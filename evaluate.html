<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🤖 AI 博士申请评估</title>
<style>
:root{--bg:#faf9f7;--card:#fff;--accent:#7c3aed;--border:#e4dcec;--text:#1a1225;--muted:#6b5b7a}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC",sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
header{background:linear-gradient(135deg,#1a0a30,#3b1f70,#7c3aed);color:white;padding:48px 20px 36px;text-align:center}
header h1{font-size:clamp(1.6rem,4vw,2.4rem);font-weight:800;margin-bottom:8px}
header p{opacity:.85;font-size:.95rem}
.container{max-width:800px;margin:0 auto;padding:0 20px}
.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--accent);text-decoration:none;font-weight:600;font-size:.9rem;margin:16px 0;display:inline-block}
.back-link:hover{text-decoration:underline}
textarea{width:100%;min-height:200px;padding:18px;border-radius:16px;border:2px solid var(--border);font-size:.92rem;line-height:1.7;font-family:inherit;resize:vertical;outline:none;margin-top:16px}
textarea:focus{border-color:var(--accent)}
.controls{display:flex;gap:16px;flex-wrap:wrap;margin:16px 0}
.controls select{padding:10px 14px;border-radius:12px;border:2px solid var(--border);font-size:.88rem;min-width:160px}
.submit-btn{display:block;width:100%;padding:16px;border-radius:14px;background:linear-gradient(135deg,#7c3aed,#a855f7);color:white;border:none;font-size:1.05rem;font-weight:700;cursor:pointer;margin:16px 0}
.submit-btn:disabled{opacity:.5;cursor:not-allowed}
.submit-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 24px rgba(124,58,237,.3)}
.results{background:var(--card);border-radius:20px;padding:28px;box-shadow:0 2px 20px rgba(0,0,0,.05);margin-bottom:48px;display:none;line-height:1.8}
.results.visible{display:block}
.results h2{color:var(--accent);margin:20px 0 10px;font-size:1.15rem}
.results h2:first-child{margin-top:0}
.loading{display:none;text-align:center;padding:32px}
.loading.visible{display:block}
.spinner{display:inline-block;width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
footer{text-align:center;padding:28px;font-size:.78rem;color:var(--muted)}
.score-badge{display:inline-block;padding:4px 12px;border-radius:999px;font-weight:700;font-size:.82rem;margin-left:8px}
.score-high{background:#d1fae5;color:#065f46}
.score-mid{background:#fef3c7;color:#92400e}
.score-low{background:#fee2e2;color:#991b1b}
.sup-card{background:#f8fafc;border-radius:12px;padding:14px 18px;margin:10px 0;border:1px solid #e2e8f0}
.sup-card strong{color:#1e293b}
</style>
</head>
<body>
<header>
  <h1>🤖 AI 博士申请录取评估</h1>
  <p>粘贴你的背景信息，DeepSeek AI 即时评估 NTU/澳洲/新西兰 PhD 录取概率</p>
</header>

<div class="container">
  <a href="index.html" class="back-link">← 返回导师库</a>

  <textarea id="bgInput" placeholder="请粘贴你的背景信息，越详细评估越准确。例如：

教育背景：本科/硕士学校、专业、GPA
科研经历：研究方向、项目、掌握的实验/分析方法
论文：期刊名称、作者排序、影响因子
技能：编程(R/Python)、生信工具(Seurat/edgeR…)
语言：TOEFL/IELTS
偏好：想去哪个地区、想跟哪位导师"></textarea>

  <div class="controls">
    <select id="regionSelect">
      <option value="all">全部地区</option>
      <option value="NTU">🇸🇬 NTU 新加坡</option>
      <option value="Australia">🇦🇺 澳大利亚</option>
      <option value="New Zealand">🇳🇿 新西兰</option>
    </select>
    <select id="directionSelect">
      <option value="medical" selected>🧬 药学 & 医学生信</option>
      <option value="environmental">🌊 环境微生物 & 水处理</option>
      <option value="both">两个方向都评估</option>
    </select>
  </div>

  <button class="submit-btn" id="submitBtn" onclick="evaluate()">🚀 开始 AI 评估</button>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>DeepSeek AI 正在分析你的背景…<br><small>通常需要 15-30 秒</small></p>
  </div>

  <div class="results" id="results"></div>
</div>

<footer>
  <p>评估由 DeepSeek AI 生成 · API Key 仅存后端 · 数据不会保留</p>
</footer>

<script>
const API_URL = 'https://vercel-proxy-snowy-sigma.vercel.app/api/evaluate';
// No supervisors loaded on standalone evaluate page - will work without per-supervisor scores
window.SUPERVISORS = [];

async function evaluate() {
  const bg = document.getElementById('bgInput').value.trim();
  if (!bg || bg.length < 20) { alert('背景信息至少 20 字'); return; }

  document.getElementById('loading').classList.add('visible');
  document.getElementById('results').classList.remove('visible');
  document.getElementById('results').innerHTML = '';
  document.getElementById('submitBtn').disabled = true;

  try {
    const resp = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        background: bg,
        target_region: document.getElementById('regionSelect').value,
        target_direction: document.getElementById('directionSelect').value,
        supervisors: window.SUPERVISORS || []
      })
    });
    const data = await resp.json();

    if (data.error) { alert('错误: ' + data.error); return; }

    const r = data.result;
    if (r.raw) {
      // JSON parse failed on server, show raw text
      document.getElementById('results').innerHTML = '<pre>' + r.raw + '</pre>';
    } else {
      renderResults(r);
    }
    document.getElementById('results').classList.add('visible');
    document.getElementById('results').scrollIntoView({behavior:'smooth'});
  } catch(e) {
    alert('网络错误: ' + e.message + '\n请确认能访问 vercel.app 域名');
  } finally {
    document.getElementById('loading').classList.remove('visible');
    document.getElementById('submitBtn').disabled = false;
  }
}

function renderResults(r) {
  let html = '';

  // Overall score
  const score = r.overall_score || 0;
  const scoreCls = score >= 70 ? 'score-high' : score >= 45 ? 'score-mid' : 'score-low';
  html += `<h2>📊 整体竞争力：<span class="score-badge ${scoreCls}">${score}/100</span></h2>`;
  html += `<p>${r.overall_analysis || ''}</p>`;

  // Region scores
  if (r.region_scores) {
    html += '<h2>🌏 各地区录取概率</h2>';
    for (const [region, s] of Object.entries(r.region_scores)) {
      const cls = s >= 70 ? 'score-high' : s >= 40 ? 'score-mid' : 'score-low';
      const flag = region === 'NTU' ? '🇸🇬' : region === 'Australia' ? '🇦🇺' : '🇳🇿';
      html += `<p>${flag} <strong>${region}</strong>：<span class="score-badge ${cls}">${s}%</span> — ${r.region_analysis?.[region] || ''}</p>`;
    }
  }

  // Strengths & weaknesses
  if (r.strengths?.length) {
    html += '<h2>✅ 优势</h2><ul>' + r.strengths.map(s => `<li>${s}</li>`).join('') + '</ul>';
  }
  if (r.weaknesses?.length) {
    html += '<h2>⚠️ 短板</h2><ul>' + r.weaknesses.map(s => `<li>${s}</li>`).join('') + '</ul>';
  }
  if (r.suggestions?.length) {
    html += '<h2>💡 提升建议</h2><ol>' + r.suggestions.map((s,i) => `<li>${s}</li>`).join('') + '</ol>';
  }

  // Per-supervisor scores
  if (r.supervisor_scores && window.SUPERVISORS) {
    html += '<h2>👨‍🔬 各导师录取概率</h2>';
    const sups = window.SUPERVISORS;
    for (const sup of sups) {
      const ss = r.supervisor_scores[sup.id];
      const pct = ss?.score || 0;
      const cls = pct >= 70 ? 'score-high' : pct >= 40 ? 'score-mid' : 'score-low';
      html += `<div class="sup-card"><strong>${sup.name}</strong> <small>${sup.university}</small> <span class="score-badge ${cls}">${pct}%</span>${ss?.note ? `<br><small style="color:#64748b">${ss.note}</small>` : ''}</div>`;
    }
  }

  if (r.timeline) {
    html += `<h2>📅 时间线</h2><p>${r.timeline}</p>`;
  }

  document.getElementById('results').innerHTML = html;
}

// Save/restore background from localStorage
const saved = localStorage.getItem('phd-eval-bg');
if (saved) document.getElementById('bgInput').value = saved;
document.getElementById('bgInput').addEventListener('input', function() {
  localStorage.setItem('phd-eval-bg', this.value);
});
</script>
</body>
</html>
